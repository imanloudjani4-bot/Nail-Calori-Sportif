<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nail-Calori Sportif</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">💪</div>

        <h1>Nail-Calori Sportif</h1>

        <p>
            تحليل ذكي للسعرات والبروتين والكربوهيدرات من صور الطعام
        </p>
    </div>

    <label class="upload-box">
        📸 اختر صورة وجبة
        <input
            type="file"
            id="imageInput"
            accept="image/*"
            capture="environment">
    </label>

    <img id="preview">

    <button id="analyzeBtn">
        🔍 تحليل الوجبة
    </button>

    <div id="loading" class="hidden">
        ⏳ جاري تحليل الصورة...
    </div>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
